<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邀请函</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .invitation-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
            overflow: hidden;
            animation: fadeInUp 1s ease-out;
        }
        
        .card-header {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        
        .card-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 300;
        }
        
        .card-header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .card-body {
            padding: 30px 20px;
            text-align: center;
        }
        
        .event-info {
            margin-bottom: 30px;
        }
        
        .event-info h2 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .info-icon {
            width: 40px;
            height: 40px;
            background: #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            margin-right: 15px;
        }
        
        .info-text {
            text-align: left;
        }
        
        .info-text .label {
            font-size: 12px;
            color: #666;
            margin-bottom: 2px;
        }
        
        .info-text .value {
            font-size: 16px;
            color: #333;
            font-weight: 500;
        }
        
        .rsvp-button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.3s ease;
            margin-bottom: 20px;
        }
        
        .rsvp-button:hover {
            transform: translateY(-2px);
        }
        
        .contact-info {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .decoration {
            position: absolute;
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            animation: float 3s ease-in-out infinite;
        }
        
        .decoration:nth-child(1) {
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }
        
        .decoration:nth-child(2) {
            top: 60%;
            right: 10%;
            animation-delay: 1s;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="decoration"></div>
    <div class="decoration"></div>
    
    <div class="invitation-card">
        <div class="card-header">
            <h1>💌 邀请函</h1>
            <p>诚挚邀请您的到来</p>
        </div>
        
        <div class="card-body">
            <div class="event-info">
                <h2>活动详情</h2>
                
                <div class="info-item">
                    <div class="info-icon">📅</div>
                    <div class="info-text">
                        <div class="label">活动时间</div>
                        <div class="value">2026年4月1日 19:00</div>
                    </div>
                </div>
                
                <div class="info-item">
                    <div class="info-icon">📍</div>
                    <div class="info-text">
                        <div class="label">活动地点</div>
                        <div class="value">示例酒店大厅</div>
                    </div>
                </div>
                
                <div class="info-item">
                    <div class="info-icon">👥</div>
                    <div class="info-text">
                        <div class="label">邀请对象</div>
                        <div class="value">亲朋好友</div>
                    </div>
                </div>
            </div>
            
            <button class="rsvp-button" onclick="confirmAttendance()">
                确认参加
            </button>
            
            <div class="contact-info">
                <p>如有疑问，请联系：</p>
                <p>📞 138-0000-0000</p>
                <p>📧 example@email.com</p>
            </div>
        </div>
    </div>

    <script>
        function confirmAttendance() {
            alert('感谢您的确认！我们会准时恭候您的到来！🎉');
        }
        
        // 添加微信分享配置（需要在实际部署时配置）
        document.addEventListener('DOMContentLoaded', function() {
            // 这里可以添加微信JSSDK配置
            console.log('邀请函页面加载完成');
        });
    </script>
</body>
</html>
