<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" id="viewport" content="width=320,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="renderer" content="webkit">
    <meta name="format-detection" content="telephone=no">
    <title>💌 邀请函</title>
    
    <!-- 微信JSSDK -->
    <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
    
    <!-- 微信分享配置 -->
    <meta name="share-title" content="💌 邀请函">
    <meta name="share-desc" content="诚挚邀请您的到来">
    <meta name="share-img" content="https://thriving-piroshki-d3261d.netlify.app/thumbnail.jpg">
    
    <style>
        * {
            margin: 0;
            padding: 0;
box-sizing: border-box;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
        }
        
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
            -webkit-font-smoothing: antialiased;
        }
        
        /* 易企秀标准页面容器 */
        .eqxiu-container {
            position: relative;
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
            min-height: 100vh;
            overflow: hidden;
        }
        
        /* 页面背景 - 易企秀标准红色喜庆背景 */
        .page-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #ff4757 0%, #ff6b7a 50%, #ff8e9b 100%);
            z-index: 1;
        }
        
        /* 装饰层 - 易企秀经典装饰 */
        .decoration-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        
        .decoration-item {
            position: absolute;
            opacity: 0.15;
        }
        
        .deco-circle-1 {
            top: 8%;
            left: 15%;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
        }
        
        .deco-square-1 {
            top: 25%;
            right: 20%;
            width: 16px;
            height: 16px;
            background: #fff;
            transform: rotate(45deg);
        }
        
        .deco-circle-2 {
            bottom: 35%;
            left: 25%;
            width: 24px;
            height: 24px;
            background: #fff;
            border-radius: 50%;
        }
        
        .deco-square-2 {
            bottom: 15%;
            right: 15%;
            width: 18px;
            height: 18px;
            background: #fff;
            transform: rotate(45deg);
        }
        
        .deco-circle-3 {
            top: 60%;
            left: 10%;
            width: 22px;
            height: 22px;
            background: #fff;
            border-radius: 50%;
        }
        
        /* 主要内容层 */
        .main-content {
            position: relative;
            z-index: 3;
            padding: 20px 15px;
        }
        
        /* 头部区域 - 易企秀标准头部 */
        .header-section {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header-title {
            font-size: 26px;
            color: #fff;
            font-weight: bold;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }
        
        .header-subtitle {
            font-size: 14px;
            color: #fff;
            opacity: 0.9;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        
        /* 卡片容器 - 易企秀经典卡片 */
        .card-container {
            background: #fff;
            border-radius: 12px;
            padding: 20px 15px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
            margin-bottom: 15px;
        }
        
        /* 活动标题区 */
        .activity-header {
            text-align: center;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .activity-header h2 {
            font-size: 18px;
            color: #333;
            font-weight: bold;
            margin-bottom: 4px;
        }
        
        .activity-header p {
            font-size: 13px;
            color: #888;
        }
        
        /* 信息列表 - 易企秀标准列表 */
        .info-list {
            margin-bottom: 20px;
        }
        
        .info-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed #f0f0f0;
        }
        
        .info-item:last-child {
            border-bottom: none;
        }
        
        .info-icon {
            width: 28px;
            height: 28px;
            margin-right: 12px;
            flex-shrink: 0;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        
        .icon-date {
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ff4757"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>');
        }
        
        .icon-location {
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ff4757"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>');
        }
        
        .icon-people {
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ff4757"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>');
        }
        
        .info-content {
            flex: 1;
        }
        
        .info-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 2px;
        }
        
        .info-text {
            font-size: 15px;
            color: #333;
            font-weight: 500;
        }
        
        /* 按钮区域 - 易企秀标准按钮 */
        .button-section {
            text-align: center;
            margin: 20px 0;
        }
        
        .action-button {
            display: inline-block;
            background: linear-gradient(135deg, #ff4757, #ff6b7a);
            color: #fff;
            border: none;
            border-radius: 20px;
            padding: 10px 28px;
            font-size: 15px;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(255, 71, 87, 0.3);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .action-button:active {
            transform: scale(0.96);
        }
        
        /* 联系信息区 - 易企秀风格 */
        .contact-section {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
        }
        
        .contact-title {
            font-size: 14px;
            color: #333;
            font-weight: bold;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .contact-info {
            text-align: center;
        }
        
        .contact-info p {
            font-size: 13px;
            color: #666;
            margin: 4px 0;
            line-height: 1.4;
        }
        
        .contact-highlight {
            color: #ff4757;
            font-weight: bold;
        }
        
        /* 底部装饰 */
        .footer-section {
            text-align: center;
            margin-top: 15px;
            color: #fff;
            font-size: 12px;
            opacity: 0.8;
        }
        
        /* 响应式适配 */
        @media (min-width: 375px) {
            .eqxiu-container {
                max-width: 375px;
            }
            
            .main-content {
                padding: 25px 20px;
            }
            
            .header-title {
                font-size: 28px;
            }
            
            .card-container {
                padding: 25px 20px;
            }
        }
        
        @media (min-width: 414px) {
            .eqxiu-container {
                max-width: 414px;
            }
            
            .main-content {
                padding: 30px 25px;
            }
        }
    </style>
</head>

        <div class="decoration-layer">

            <div class="decoration-item deco-square-1"></div>
            <div class="decoration-item deco-circle-2"></div>
            <div class="decoration-item deco-square-2"></div>
            <div class="decoration-item deco-circle-3"></div>
        </div>
        
        <!-- 主要内容层 -->
        <div class="main-content">
            <!-- 头部 -->
            <div class="header-section">
                <h1 class="header-title">💌 邀请函</h1>

            <!-- 卡片内容 -->
            <div class="card-container">

                <div class="activity-header">

                <div class="info-list">

                            <div class="info-label">活动时间</div>
                            <div class="info-text
